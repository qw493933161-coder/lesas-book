<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#C29B6E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lesa's Book</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{background:#F7F4EF;font-family:'Noto Serif SC','Hiragino Mincho ProN','Yu Mincho','Source Han Serif SC',Georgia,serif;color:#3A3530;-webkit-font-smoothing:antialiased}
ruby rt{font-size:0.55em;color:#B5AA9A}
input,textarea,button,select{font-family:inherit;outline:none}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const{useState,useRef,useCallback,useEffect}=React;
const h=React.createElement;

const LS=k=>{try{return JSON.parse(localStorage.getItem("lb2_"+k))}catch{return null}};
const SS=(k,v)=>{try{localStorage.setItem("lb2_"+k,JSON.stringify(v))}catch{}};
const fmtDate=d=>{const dt=d instanceof Date?d:new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`};
const TODAY=fmtDate(new Date());
const NOW=new Date();
const WKCN=["日","一","二","三","四","五","六"];
const WKJP=["日","月","火","水","木","金","土"];

const GREETINGS=[
{cn:"又是新的一天，慢慢来",jp:"<ruby>新<rt>あたら</rt></ruby>しい<ruby>一日<rt>いちにち</rt></ruby>、ゆっくりね"},
{cn:"今天也要好好对自己",jp:"<ruby>今日<rt>きょう</rt></ruby>も<ruby>自分<rt>じぶん</rt></ruby>を<ruby>大切<rt>たいせつ</rt></ruby>に"},
{cn:"能打开这里，就已经很好了",jp:"ここを<ruby>開<rt>あ</rt></ruby>けただけで、もう<ruby>十分<rt>じゅうぶん</rt></ruby>"},
{cn:"不用完美，做了就算",jp:"<ruby>完璧<rt>かんぺき</rt></ruby>じゃなくていい、やっただけで<ruby>十分<rt>じゅうぶん</rt></ruby>"},
{cn:"每一小步都在积累",jp:"<ruby>小<rt>ちい</rt></ruby>さな<ruby>一歩<rt>いっぽ</rt></ruby>も<ruby>積<rt>つ</rt></ruby>み<ruby>重<rt>かさ</rt></ruby>ね"},
{cn:"你比想象中走得更远了",jp:"<ruby>思<rt>おも</rt></ruby>ったより<ruby>遠<rt>とお</rt></ruby>くまで<ruby>来<rt>き</rt></ruby>たよ"},
{cn:"深呼吸，然后开始吧",jp:"<ruby>深呼吸<rt>しんこきゅう</rt></ruby>して、<ruby>始<rt>はじ</rt></ruby>めよう"},
{cn:"不急，先看看昨天的自己",jp:"<ruby>焦<rt>あせ</rt></ruby>らないで、<ruby>昨日<rt>きのう</rt></ruby>の<ruby>自分<rt>じぶん</rt></ruby>を<ruby>見<rt>み</rt></ruby>てみよう"},
{cn:"今天想做什么，就做什么",jp:"<ruby>今日<rt>きょう</rt></ruby>やりたいことを、やろう"},
{cn:"累了就休息，这也是进步",jp:"<ruby>疲<rt>つか</rt></ruby>れたら<ruby>休<rt>やす</rt></ruby>む、それも<ruby>前進<rt>ぜんしん</rt></ruby>"},
];
const REWARDS=[
{cn:"又多了一片叶子 🌿",jp:"また<ruby>一枚<rt>いちまい</rt></ruby>、<ruby>葉<rt>は</rt></ruby>が<ruby>増<rt>ふ</rt></ruby>えた"},
{cn:"今天的你，值得被记住 ✨",jp:"<ruby>今日<rt>きょう</rt></ruby>のあなたは、<ruby>記憶<rt>きおく</rt></ruby>に<ruby>値<rt>あたい</rt></ruby>する"},
{cn:"小小一步，稳稳地走 🐾",jp:"<ruby>小<rt>ちい</rt></ruby>さな<ruby>一歩<rt>いっぽ</rt></ruby>、しっかりと"},
{cn:"这份记录，未来的你会感谢的 📖",jp:"この<ruby>記録<rt>きろく</rt></ruby>、<ruby>未来<rt>みらい</rt></ruby>の<ruby>自分<rt>じぶん</rt></ruby>がきっと<ruby>感謝<rt>かんしゃ</rt></ruby>する"},
{cn:"好事正在发生 🍀",jp:"いいことが<ruby>起<rt>お</rt></ruby>きている"},
];
const todayGreeting=GREETINGS[Math.floor((new Date(TODAY).getTime()/86400000))%GREETINGS.length];
const getReward=()=>REWARDS[Math.floor(Math.random()*REWARDS.length)];

const DEF_HABITS=[
{id:"aesthetic",name:"审美练习",jp:"審美トレーニング",emoji:"🎨",desc:"看一张好图，或存一个参考"},
{id:"japanese",name:"日语单词",jp:"日本語単語",emoji:"📖",desc:"背单词，复习，或听一段日语"},
];

function init(){return{
  todos:LS("todos")||[],
  habits:LS("habits")||DEF_HABITS,
  checkins:LS("checkins")||{},
  notes:LS("notes")||[],
  reminders:LS("reminders")||[],
  settings:LS("settings")||{reminderTime:"21:00",notifEnabled:false}
}}
function calcStreak(ck,hid){let s=0;for(let i=0;i<365;i++){const d=new Date(NOW);d.setDate(d.getDate()-i);if(ck[fmtDate(d)+"_"+hid])s++;else if(i===0)continue;else break}return s}
function calcTotal(ck,hid){return Object.keys(ck).filter(k=>k.endsWith("_"+hid)&&ck[k]).length}

const C={bg:"#F7F4EF",card:"#FEFCF9",bdr:"#E4DDD3",tx:"#3A3530",tx2:"#847A6E",tx3:"#B5AA9A",acc:"#8BA87A",accL:"#C5D4B3",warm:"#C29B6E",warmL:"#EDDCC8",overdue:"#D4A089"};
const ft="'Noto Serif SC','Hiragino Mincho ProN','Yu Mincho',Georgia,serif";
const ftJp="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif";
const pg={padding:"0 16px 16px"};
const card={backgroundColor:C.card,borderRadius:14,padding:"18px 20px",marginBottom:12,border:"1px solid "+C.bdr+"50"};
const cardHead={display:"flex",alignItems:"baseline",gap:8,marginBottom:14};

/* ═══ Notification helper ═══ */
function requestNotif(){
  if(!("Notification" in window))return Promise.resolve(false);
  if(Notification.permission==="granted")return Promise.resolve(true);
  return Notification.requestPermission().then(p=>p==="granted");
}
function sendNotif(title,body){
  if(Notification.permission==="granted"){new Notification(title,{body,icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23F7F4EF'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-size='36' fill='%23C29B6E'%3EL%3C/text%3E%3C/svg%3E"})}
}

/* ═══════════════ MAIN APP ═══════════════ */
function App(){
  const[st,setSt]=useState(init);
  const[tab,setTab]=useState("today");
  const[sub,setSub]=useState(null);
  const save=(k,v)=>SS(k,v);
  const up=fn=>setSt(p=>{const n=fn(p);Object.keys(n).forEach(k=>{if(n[k]!==p[k])save(k,n[k])});return n});
  const dateLabel=`${NOW.getMonth()+1}月${NOW.getDate()}日（${WKJP[NOW.getDay()]}）`;

  // Check reminders on load
  useEffect(()=>{
    const todayReminders=st.reminders.filter(r=>r.date===TODAY&&!r.notified);
    if(todayReminders.length>0&&Notification.permission==="granted"){
      todayReminders.forEach(r=>{sendNotif("Lesa's Book 提醒",r.text)});
      up(s=>({...s,reminders:s.reminders.map(r=>r.date===TODAY?{...r,notified:true}:r)}));
    }
  },[]);

  return h('div',{style:{maxWidth:400,margin:"0 auto",minHeight:"100vh",backgroundColor:C.bg,fontFamily:ft,color:C.tx,position:"relative",paddingBottom:72}},
    h('div',{style:{position:"fixed",top:0,left:0,right:0,bottom:0,opacity:.08,backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3h1v1H1V3zm2-2h1v1H3V1z' fill='%23000' fill-opacity='0.15'/%3E%3C/svg%3E\")",pointerEvents:"none",zIndex:0}}),
    h('header',{style:{position:"relative",zIndex:1,padding:"20px 22px 14px"}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline"}},
        h('span',{style:{fontSize:20,fontWeight:600,color:C.warm,letterSpacing:1,fontFamily:"'Playfair Display',Georgia,"+ft}},"Lesa's Book"),
        h('span',{style:{fontSize:12,color:C.tx3,fontFamily:ftJp}},dateLabel)
      )
    ),
    h('main',{style:{position:"relative",zIndex:1}},
      tab==="today"&&h(TodayTab,{st,up}),
      tab==="habits"&&h(HabitsTab,{st,up,sub,setSub}),
      tab==="stats"&&h(StatsTab,{st}),
      tab==="me"&&h(MeTab,{st,up})
    ),
    h('nav',{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:400,display:"flex",backgroundColor:C.card+"F0",borderTop:"1px solid "+C.bdr+"80",padding:"8px 0 env(safe-area-inset-bottom,6px)",zIndex:10,backdropFilter:"blur(10px)"}},
      [{id:"today",cn:"今日",jp:"きょう"},{id:"habits",cn:"习惯",jp:"しゅうかん"},{id:"stats",cn:"统计",jp:"とうけい"},{id:"me",cn:"我的",jp:"わたし"}].map(t=>
        h('button',{key:t.id,onClick:()=>{setTab(t.id);setSub(null)},style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"6px 0",background:"none",border:"none",cursor:"pointer",opacity:tab===t.id?1:.35,transition:"opacity 0.2s"}},
          h('span',{style:{fontSize:12,color:C.tx,fontWeight:500}},t.cn),
          h('span',{style:{fontSize:8,color:C.tx3,fontFamily:ftJp}},t.jp)
        )
      )
    )
  );
}

/* ═══════════════ TODAY TAB ═══════════════ */
function TodayTab({st,up}){
  const[newTodo,setNewTodo]=useState("");
  const[diary,setDiary]=useState(null);
  const[noteText,setNoteText]=useState("");
  const[quickNote,setQuickNote]=useState("");
  const[showNote,setShowNote]=useState(false);
  const[reward,setReward]=useState(null);

  // All non-deleted todos: today's + overdue (past dates, not done)
  const todayTodos=st.todos.filter(t=>t.date===TODAY);
  const overdueTodos=st.todos.filter(t=>t.date<TODAY&&!t.done);
  const canAdd=todayTodos.length<3;
  const habits=st.habits.map(hb=>({...hb,done:!!st.checkins[TODAY+"_"+hb.id],total:calcTotal(st.checkins,hb.id),level:st.checkins[TODAY+"_"+hb.id]?.level}));
  const yd=new Date(NOW);yd.setDate(yd.getDate()-1);const ydStr=fmtDate(yd);
  const ydNotes=st.notes.filter(n=>n.date===ydStr);
  const ydCheckins=st.habits.filter(hb=>st.checkins[ydStr+"_"+hb.id]);

  // Today's reminders
  const todayReminders=st.reminders.filter(r=>r.date===TODAY);

  const addTodo=()=>{if(!newTodo.trim()||!canAdd)return;up(s=>({...s,todos:[...s.todos,{id:Date.now()+"",text:newTodo.trim(),date:TODAY,done:false}]}));setNewTodo("")};
  const toggleTodo=id=>up(s=>({...s,todos:s.todos.map(t=>t.id===id?{...t,done:!t.done}:t)}));
  const delTodo=id=>up(s=>({...s,todos:s.todos.filter(t=>t.id!==id)}));
  const moveToToday=id=>up(s=>({...s,todos:s.todos.map(t=>t.id===id?{...t,date:TODAY}:t)}));

  const doCheckin=(level)=>{setDiary(d=>({...d,step:"note",level}))};
  const finishCheckin=()=>{const{habitId,level}=diary;const key=TODAY+"_"+habitId;up(s=>({...s,checkins:{...s.checkins,[key]:{level,time:new Date().toISOString(),note:noteText.trim()}},...(noteText.trim()?{notes:[...s.notes,{id:Date.now()+"",text:noteText.trim(),date:TODAY,time:new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}),habitId}]}:{})}));setNoteText("");const r=getReward();setReward(r);setDiary(null);setTimeout(()=>setReward(null),3000)};
  const skipNote=()=>{const{habitId,level}=diary;const key=TODAY+"_"+habitId;up(s=>({...s,checkins:{...s.checkins,[key]:{level,time:new Date().toISOString(),note:""}}}));const r=getReward();setReward(r);setDiary(null);setTimeout(()=>setReward(null),3000)};
  const saveQuickNote=()=>{if(!quickNote.trim())return;up(s=>({...s,notes:[...s.notes,{id:Date.now()+"",text:quickNote.trim(),date:TODAY,time:new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"})}]}));setQuickNote("");setShowNote(false)};
  const todayNotes=st.notes.filter(n=>n.date===TODAY);

  // Diary modal
  if(diary){
    const hb=st.habits.find(x=>x.id===diary.habitId);
    if(diary.step==="level")return h('div',{style:pg},h('div',{style:{maxWidth:320,margin:"40px auto 0",textAlign:"center",padding:"32px 24px",backgroundColor:C.card,borderRadius:18,border:"1px solid "+C.bdr+"50"}},
      h('div',{style:{fontSize:40,marginBottom:12}},hb.emoji),
      h('div',{style:{fontSize:18,fontWeight:600,marginBottom:2}},hb.name),
      h('div',{style:{fontSize:12,color:C.tx3,fontFamily:ftJp,marginBottom:20}},hb.jp),
      h('div',{style:{fontSize:14,color:C.tx2,marginBottom:20}},"今天做了吗？"),
      h('button',{style:{width:"100%",padding:12,fontSize:13,backgroundColor:C.acc,color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontFamily:ft,fontWeight:500,marginBottom:8},onClick:()=>doCheckin("full")},"认真做了 ◎"),
      h('button',{style:{width:"100%",padding:12,fontSize:12,backgroundColor:"transparent",color:C.tx2,border:"1px dashed "+C.bdr,borderRadius:10,cursor:"pointer",fontFamily:ft,marginBottom:8},onClick:()=>doCheckin("min")},"碰了一下 ○"),
      h('button',{style:{width:"100%",padding:10,fontSize:12,color:C.tx3,backgroundColor:"transparent",border:"none",cursor:"pointer",fontFamily:ft},onClick:()=>setDiary(null)},"还没做")
    ));
    if(diary.step==="note")return h('div',{style:pg},h('div',{style:{maxWidth:320,margin:"40px auto 0",textAlign:"center",padding:"32px 24px",backgroundColor:C.card,borderRadius:18,border:"1px solid "+C.bdr+"50"}},
      h('div',{style:{fontSize:40,marginBottom:12}},hb.emoji),
      h('div',{style:{fontSize:15,color:C.tx,marginBottom:4,fontWeight:500}},"想记点什么吗？"),
      h('div',{style:{fontSize:11,color:C.tx3,fontFamily:ftJp,marginBottom:16}},"何かメモしたいことは？"),
      h('textarea',{style:{width:"100%",padding:12,border:"1px solid "+C.bdr,borderRadius:10,fontSize:13,fontFamily:ft,color:C.tx,backgroundColor:C.bg,resize:"none",outline:"none",boxSizing:"border-box",lineHeight:1.6,marginBottom:16},value:noteText,onChange:e=>setNoteText(e.target.value),placeholder:"一个字也行，留白也行...",rows:3,autoFocus:true}),
      h('button',{style:{width:"100%",padding:12,fontSize:13,backgroundColor:C.acc,color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontFamily:ft,fontWeight:500,marginBottom:8},onClick:finishCheckin},noteText.trim()?"保存并完成":"跳过，完成打卡"),
      h('button',{style:{width:"100%",padding:10,fontSize:11,color:C.tx3,backgroundColor:"transparent",border:"none",cursor:"pointer",fontFamily:ft},onClick:skipNote},"直接跳过")
    ));
  }

  return h('div',{style:pg},
    reward&&h('div',{style:{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",zIndex:100,backgroundColor:C.card,border:"1px solid "+C.accL,borderRadius:14,padding:"14px 24px",textAlign:"center",boxShadow:"0 4px 20px "+C.bdr+"60",animation:"fadeInUp 0.4s ease"}},
      h('div',{style:{fontSize:14,color:C.acc,fontWeight:500}},reward.cn),
      h('div',{style:{fontSize:12,color:C.tx2,fontFamily:ftJp,marginTop:4,lineHeight:2.2},dangerouslySetInnerHTML:{__html:reward.jp}})
    ),
    // Calibration
    h('section',{style:{padding:"20px 22px",marginBottom:4,textAlign:"center"}},
      h('div',{style:{fontSize:16,lineHeight:1.8,color:C.tx2}},todayGreeting.cn),
      h('div',{style:{fontSize:14,color:C.tx2,fontFamily:ftJp,marginTop:8,lineHeight:2.2},dangerouslySetInnerHTML:{__html:todayGreeting.jp}}),
      (ydCheckins.length>0||ydNotes.length>0)&&h('div',{style:{marginTop:16,padding:"12px 16px",backgroundColor:C.card,borderRadius:12,border:"1px solid "+C.bdr+"60",textAlign:"left"}},
        h('div',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp,marginBottom:6}},"昨日の記録"),
        ...ydCheckins.map(hb=>h('span',{key:hb.id,style:{display:"inline-block",fontSize:11,color:C.tx2,backgroundColor:C.warmL,padding:"2px 8px",borderRadius:10,marginRight:6,marginBottom:4}},hb.emoji+" "+hb.name)),
        ydNotes.length>0&&h('div',{style:{fontSize:12,color:C.tx2,fontStyle:"italic",marginTop:6,lineHeight:1.5}},'"'+ydNotes[ydNotes.length-1].text.slice(0,40)+(ydNotes[ydNotes.length-1].text.length>40?"...":"")+'"')
      )
    ),
    // Today's reminders
    todayReminders.length>0&&h('section',{style:{...card,borderLeft:"3px solid "+C.warm}},
      h('div',{style:cardHead},h('span',{style:{fontSize:14,fontWeight:600}},"今日提醒"),h('span',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp}},"リマインダー")),
      ...todayReminders.map(r=>h('div',{key:r.id,style:{fontSize:13,color:C.warm,padding:"4px 0",lineHeight:1.5}},"⏰ "+r.text))
    ),
    // Overdue todos
    overdueTodos.length>0&&h('section',{style:{...card,borderLeft:"3px solid "+C.overdue}},
      h('div',{style:cardHead},h('span',{style:{fontSize:14,fontWeight:600,color:C.overdue}},"未完成"),h('span',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp}},"未完了")),
      ...overdueTodos.map(t=>h('div',{key:t.id,style:{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid "+C.bdr+"25"}},
        h('span',{style:{flex:1,fontSize:13,color:C.tx2}},t.text),
        h('span',{style:{fontSize:9,color:C.tx3}},t.date.slice(5)),
        h('button',{style:{padding:"4px 10px",fontSize:10,backgroundColor:C.warmL,color:C.warm,border:"none",borderRadius:6,cursor:"pointer",fontFamily:ft},onClick:()=>moveToToday(t.id)},"移到今天"),
        h('button',{style:{background:"none",border:"none",color:C.tx3,fontSize:14,cursor:"pointer",opacity:.5},onClick:()=>delTodo(t.id)},"×")
      ))
    ),
    // Habits checkin
    h('section',{style:card},
      h('div',{style:cardHead},h('span',{style:{fontSize:14,fontWeight:600}},"今日打卡"),h('span',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp}},"チェックイン")),
      ...habits.map(hb=>h('div',{key:hb.id,style:{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:"1px solid "+C.bdr+"30"}},
        h('span',{style:{fontSize:22,width:32,textAlign:"center"}},hb.emoji),
        h('div',{style:{flex:1}},h('span',{style:{fontSize:14,fontWeight:500,display:"block"}},hb.name),h('span',{style:{fontSize:10,color:C.tx3,display:"block",marginTop:1}},hb.total+"日 累計")),
        hb.done?h('div',{style:{width:36,height:36,borderRadius:"50%",backgroundColor:C.accL,display:"flex",alignItems:"center",justifyContent:"center"}},h('span',{style:{color:C.acc,fontSize:14,fontWeight:600}},hb.level==="full"?"◎":"○")):h('button',{style:{padding:"8px 16px",fontSize:12,backgroundColor:C.warmL,color:C.warm,border:"none",borderRadius:20,cursor:"pointer",fontFamily:ft,fontWeight:500},onClick:()=>setDiary({habitId:hb.id,step:"level"})},"打卡")
      ))
    ),
    // Todos
    h('section',{style:card},
      h('div',{style:cardHead},h('span',{style:{fontSize:14,fontWeight:600}},"今日待办"),h('span',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp}},"やること"),h('span',{style:{marginLeft:"auto",fontSize:11,color:C.tx3}},todayTodos.filter(t=>t.done).length+"/"+todayTodos.length)),
      ...todayTodos.map(t=>h('div',{key:t.id,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid "+C.bdr+"25"}},
        h('button',{style:{width:20,height:20,borderRadius:"50%",border:"1.5px solid "+(t.done?C.acc:C.bdr),backgroundColor:t.done?C.acc:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:t.done?"#fff":C.acc,flexShrink:0},onClick:()=>toggleTodo(t.id)},t.done&&"✓"),
        h('span',{style:{flex:1,fontSize:13,lineHeight:1.5,...(t.done?{textDecoration:"line-through",color:C.tx3}:{})}},t.text),
        h('button',{style:{background:"none",border:"none",color:C.tx3,fontSize:14,cursor:"pointer",opacity:.4},onClick:()=>delTodo(t.id)},"×")
      )),
      canAdd?h('div',{style:{display:"flex",gap:8,marginTop:10}},

/* ═══════════════ ME TAB (with Calendar) ═══════════════ */
function MeTab({st,up}){
  const importRef=useRef(null);
  const[calMonth,setCalMonth]=useState(NOW.getMonth());

  const[selectedDate,setSelectedDate]=useState(null);
  const[newReminder,setNewReminder]=useState("");
  const[notifStatus,setNotifStatus]=useState(typeof Notification!=="undefined"?Notification.permission:"unsupported");

  const doExport=()=>{const d=JSON.stringify(st,null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="lesas-book-"+TODAY+".json";a.click();URL.revokeObjectURL(u)};
  const doImport=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.habits&&d.checkins){Object.keys(d).forEach(k=>SS(k,d[k]));window.location.reload()}}catch{}};r.readAsText(f)};
  const enableNotif=()=>{requestNotif().then(ok=>{setNotifStatus(ok?"granted":"denied");if(ok){up(s=>({...s,settings:{...s.settings,notifEnabled:true}}));sendNotif("Lesa's Book","通知已开启 🌿")}})};

  // Calendar
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const calDates=[];
  for(let i=0;i<firstDay;i++)calDates.push(null);
  for(let d=1;d<=daysInMonth;d++)calDates.push(fmtDate(new Date(calYear,calMonth,d)));

  const prevMonth=()=>{if(calMonth===0){setCalMonth(11);setCalYear(calYear-1)}else setCalMonth(calMonth-1);setSelectedDate(null)};
  const nextMonth=()=>{if(calMonth===11){setCalMonth(0);setCalYear(calYear+1)}else setCalMonth(calMonth+1);setSelectedDate(null)};

  const addReminder=()=>{if(!newReminder.trim()||!selectedDate)return;up(s=>({...s,reminders:[...s.reminders,{id:Date.now()+"",date:selectedDate,text:newReminder.trim(),notified:false}]}));setNewReminder("")};
  const delReminder=id=>up(s=>({...s,reminders:s.reminders.filter(r=>r.id!==id)}));

  const dateReminders=selectedDate?st.reminders.filter(r=>r.date===selectedDate):[];

    // Calendar

      h('div',{style:cardHead},h('span',{style:{fontSize:14,fontWeight:600}},"日历提醒"),h('span',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp}},"カレンダー")),
      // Month nav
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h('button',{style:{background:"none",border:"none",color:C.tx2,fontSize:16,cursor:"pointer",padding:"4px 8px"}, onClick:prevMonth},"‹"),
        h('span',{style:{fontSize:14,fontWeight:600}},calYear+"年"+(calMonth+1)+"月"),
        h('button',{style:{background:"none",border:"none",color:C.tx2,fontSize:16,cursor:"pointer",padding:"4px 8px"},onClick:nextMonth},"›")
      ),
      // Week header
      h('div',{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}},
        ...WKCN.map(d=>h('span',{key:d,style:{fontSize:10,color:C.tx3,textAlign:"center"}},d))

      // Calendar grid
      h('div',{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}},
        ...calDates.map((ds,i)=>{
          if(!ds)return h('div',{key:"e"+i,style:{aspectRatio:"1"}});
          const isT=ds===TODAY;
          const isSel=ds===selectedDate;
          const hasR=hasReminder(ds);
          const day=new Date(ds+"T00:00:00").getDate();
          return h('button',{key:ds,onClick:()=>setSelectedDate(ds===selectedDate?null:ds),style:{aspectRatio:"1",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:isSel?"2px solid "+C.warm:isT?"1.5px solid "+C.acc:"1px solid transparent",backgroundColor:isSel?C.warmL:"transparent",cursor:"pointer",background:"none",position:"relative"}},
            h('span',{style:{fontSize:12,color:isT?C.acc:C.tx,fontWeight:isT?600:400}},day),

          h('span',{style:{fontSize:12,color:C.tx2,flex:1}},"⏰ "+r.text),
          h('button',{style:{background:"none",border:"none",color:C.tx3,fontSize:14,cursor:"pointer",opacity:.5},onClick:()=>delReminder(r.id)},"×")
        )),
        h('div',{style:{display:"flex",gap:8,marginTop:8}},
          h('input',{style:{flex:1,padding:"8px 10px",border:"1px dashed "+C.bdr,borderRadius:8,fontSize:12,backgroundColor:"transparent",color:C.tx,fontFamily:ft},value:newReminder,onChange:e=>setNewReminder(e.target.value),placeholder:"添加提醒事项...",onKeyDown:e=>e.key==="Enter"&&addReminder(),maxLength:40}),
          h('button',{style:{padding:"8px 14px",fontSize:12,backgroundColor:C.acc,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontFamily:ft},onClick:addReminder},"添加")
        )

    // Notifications
    h('section',{style:card},
      h('div',{style:cardHead},h('span',{style:{fontSize:14,fontWeight:600}},"通知"),h('span',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp}},"通知設定")),

      h('button',{style:{width:"100%",padding:12,fontSize:13,backgroundColor:C.warmL,color:C.warm,border:"none",borderRadius:10,cursor:"pointer",fontFamily:ft,fontWeight:500},onClick:enableNotif},"开启通知提醒 · 通知を有効にする")
    ),

    // Data
    h('section',{style:card},
      h('div',{style:cardHead},h('span',{style:{fontSize:14,fontWeight:600}},"数据"),h('span',{style:{fontSize:10,color:C.tx3,fontFamily:ftJp}},"データ")),
      h('button',{style:{width:"100%",padding:12,fontSize:13,backgroundColor:C.acc,color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontFamily:ft,fontWeight:500,marginBottom:8},onClick:doExport},"导出备份 · バックアップ"),
      h('button',{style:{width:"100%",padding:12,fontSize:12,backgroundColor:"transparent",color:C.tx2,border:"1px dashed "+C.bdr,borderRadius:10,cursor:"pointer",fontFamily:ft},onClick:()=>importRef.current?.click()},"导入数据 · インポート"),
      h('input',{ref:importRef,type:"file",accept:".json",style:{display:"none"},onChange:doImport})
    ),
    h('div',{style:{textAlign:"center",padding:"28px 16px 12px"}},
      h('div',{style:{fontSize:13,color:C.warm,fontStyle:"italic",lineHeight:1.6}},'"断了不归零，碰了就算数"'),
      h('div',{style:{fontSize:11,color:C.tx3,fontFamily:ftJp,marginTop:4}},'"途切れてもゼロにならない、触れただけでもカウント"')
